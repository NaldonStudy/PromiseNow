spring:
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/
      add-mappings: false  # 정적 리소스 매핑 비활성화
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${SPRING_KAKAO_CLIENT_ID}
            client-secret: ${SPRING_KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ssafy-mysql-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true}
#    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://i13b107.p.ssafy.io:3306/ssafy-mysql-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        connection:
          characterEncoding: utf8
          useUnicode: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password:
      database: 0
      timeout: 2s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms  # 무한 대기

logging:
  level:
    root: INFO
    com.promisenow.api: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # Spring MVC 관련 로그 레벨 조정
    org.springframework.web.servlet.DispatcherServlet: WARN
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: WARN
    # 쿠키 관련 로그 추가
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter: DEBUG

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always

server:
  address: 0.0.0.0
  port: 8080

auth:
  front-login-uri: http://localhost:5173

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000
  refresh-expiration: 1209600000

# 웹훅 설정
webhook:
  slack:
    url: ${SLACK_WEBHOOK_URL}
  enable:
    handled-exceptions: true   # 개발 환경에서는 핸들링된 예외도 웹훅 전송
    unhandled-exceptions: true